services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - promart-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - promart-network

  users_service:
    build:
      context: ./promart/services/users_services
      dockerfile: Dockerfile
    container_name: users_service
    env_file: ./promart/services/users_services/.env.docker
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - promart-network
    command: sh -c "sleep 30 && python manage.py runserver 0.0.0.0:8000"

  products_service:
    build:
      context: ./promart/services/products_services
      dockerfile: Dockerfile
    container_name: products_service
    env_file: ./promart/services/products_services/.env.docker
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - promart-network
    command: python manage.py runserver 0.0.0.0:8000

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: promart
      POSTGRES_USER: promartuser
      POSTGRES_PASSWORD: secret123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./promart/services/postgres_init/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promartuser -d promart"]
      interval: 10s
      retries: 10
      start_period: 60s
    networks:
      - promart-network

  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - promart-network

  celery_users:
    build:
      context: ./promart/services/users_services
      dockerfile: Dockerfile.celery
    container_name: celery_users
    env_file: ./promart/services/users_services/.env.docker
    depends_on:
      - redis
      - postgres
    networks:
      - promart-network

networks:
  promart-network:
    driver: bridge

volumes:
  postgres_data:
